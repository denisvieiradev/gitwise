name: OSV-Scanner

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * *"  # Daily at 07:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  check-ignore-expiry:
    name: Enforce ignore-entry expiry dates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Check osv-scanner.toml expiry dates
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f osv-scanner.toml ]]; then
            echo "osv-scanner.toml not found — nothing to check"
            exit 0
          fi
          now=$(date -u +%s)
          failed=0
          while IFS= read -r line; do
            if [[ "$line" =~ ignoreUntil[[:space:]]*=[[:space:]]*(\"?)([0-9]{4}-[0-9]{2}-[0-9]{2}) ]]; then
              expiry_date="${BASH_REMATCH[2]}"
              expiry_epoch=$(date -d "${expiry_date}T00:00:00Z" +%s 2>/dev/null) || true
              if [[ -z "$expiry_epoch" || "$expiry_epoch" -le "$now" ]]; then
                echo "::error::OSV-Scanner ignore entry has expired or has an unparseable date: ignoreUntil=${expiry_date}. Remove or extend the entry."
                failed=1
              fi
            fi
          done < osv-scanner.toml
          exit "$failed"

  scan-scheduled:
    name: OSV-Scanner (push / scheduled)
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
    needs: check-ignore-expiry
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
    with:
      scan-args: |-
        --recursive
        --config=osv-scanner.toml
        ./
      fail-on-vuln: true
    permissions:
      actions: read
      contents: read
      security-events: write

  scan-pr:
    name: OSV-Scanner (pull request)
    if: ${{ github.event_name == 'pull_request' }}
    needs: check-ignore-expiry
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
    with:
      scan-args: |-
        --recursive
        --config=osv-scanner.toml
        ./
      fail-on-vuln: true
    permissions:
      actions: read
      contents: read
      security-events: write
