name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.2.3) — required when triggered manually"
        required: true
        type: string
      use_npm_token:
        description: "Emergency: use NPM_TOKEN instead of OIDC (for OIDC misconfiguration only)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
    env:
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd  # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_tag_gpgsign: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Set VERSION
        run: echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Sign release tag
        run: |
          git config gpg.program gpg
          git tag -s -f "${RELEASE_TAG}" \
            -m "chore(release): ${RELEASE_TAG}" \
            --local-user "${{ steps.import-gpg.outputs.fingerprint }}"
          git push origin -f "refs/tags/${RELEASE_TAG}"

      - name: Publish packages/core (OIDC)
        if: ${{ inputs.use_npm_token != true }}
        run: npm publish -w packages/core --provenance --access public

      - name: Publish packages/cli (OIDC)
        if: ${{ inputs.use_npm_token != true }}
        run: npm publish -w packages/cli --provenance --access public

      - name: Publish packages/skills (OIDC)
        if: ${{ inputs.use_npm_token != true }}
        run: npm publish -w packages/skills --provenance --access public

      - name: Publish packages/core (emergency NPM_TOKEN)
        if: ${{ inputs.use_npm_token == true }}
        run: npm publish -w packages/core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish packages/cli (emergency NPM_TOKEN)
        if: ${{ inputs.use_npm_token == true }}
        run: npm publish -w packages/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish packages/skills (emergency NPM_TOKEN)
        if: ${{ inputs.use_npm_token == true }}
        run: npm publish -w packages/skills --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate SBOM
        run: npx @cyclonedx/cdxgen -t npm -o "sbom-${VERSION}.cdx.json" .

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          # Print the "## [<version>]" section (Keep a Changelog entry for this tag) without its heading.
          # Fails loudly if the changelog has no section for the tag being released.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {
              in_section = 1
              next
            }
            /^## / && in_section { exit }
            in_section { print }
          ' CHANGELOG.md > "$notes_file"
          if [ ! -s "$notes_file" ]; then
            echo "::error::No CHANGELOG.md section found for version ${VERSION} (tag ${RELEASE_TAG}). Refusing to publish release with stale or missing notes." >&2
            exit 1
          fi
          # Trim leading and trailing blank lines for cleaner release bodies.
          awk 'NF { found = 1 } found' "$notes_file" \
            | awk 'BEGIN { blank = 0 } { lines[NR] = $0 } END { for (i = NR; i >= 1; i--) if (lines[i] ~ /[^[:space:]]/) { last = i; break } for (i = 1; i <= last; i++) print lines[i] }' \
            > "${notes_file}.trimmed"
          mv "${notes_file}.trimmed" "$notes_file"
          echo "path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file "${{ steps.notes.outputs.path }}"

      - name: Upload SBOM to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${RELEASE_TAG}" "sbom-${VERSION}.cdx.json"

      - name: Attest SBOM
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: "sbom-${{ env.VERSION }}.cdx.json"
